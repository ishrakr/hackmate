services:
  web:
    build:
      context: .
      target: production
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        SUPABASE_PUBLIC_ANON: ${VITE_SUPABASE_ANON_KEY:-}
    ports:
      - "5173:80"

  admin:
    build:
      context: .
      target: production
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        SUPABASE_PUBLIC_ANON: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_APP_MODE: admin
    ports:
      - "5174:80"
